    <body class="contact-page">
        <header class="logo_nav">
            <h2 class="logo">BITE&BREW</h2>
            

            <button class="mode_btn"><i class="bx bx-moon" id="dark_mode_button"></i><i class="bx bx-sun" id="light_mode_button" ></i></button>
            <input type="checkbox" id="check">
            <label for="check" class="icons">
                <i class='bx bx-menu' id="menu-icon"></i>
                <i class='bx bx-x' id="close-icon"></i>
            </label>

            <nav class="header-right">
                <a href="index.html" class="active">Home</a>

                <a href="index.html" ><i class='bx bx-log-in'></i></a>
            </nav>
        </header>

        <div class="contact-card">
            <div class="form">
                <h3>Contact Us</h3>
                <form id="contactform">
                    <input type="text" placeholder="Your Name" id="name">
                    <input type="email" placeholder="Your Email" id="email">
                    <input type="tel" placeholder="Your Phone Number" id="phone">
                    <textarea type="text" placeholder="Message" id="message"></textarea>
                    <button type="submit" onclick="contact()">Send Message</button>
                </form>
            </div>
            <div class="image-side">
                <img src="contact-image.jpg">
                
            </div>
            </div>

            <footer >
        <div class="content">
            <img src="bent_img.jpg" alt="">
        </div>
        <div class="container">
            <div class="center">
                <div class="follow">
                    <h3>Follow Us</h3>
                </div>

                <div class="imgfollow">
                    <div class="face">
                        <img src="face_img.jpg" alt="">
                    </div>
                    <div class="insta">
                        <img src="instegram_img.jpg" alt="">
                    </div>
                    <div class="twitt">
                        <img src="twitter_img.jpg" alt="">
                    </div>
                </div>
            </div>

            <div class="aboutus">
                <h3>About Us</h3>
                <p>Made with love, served with joy. Bite & Brew is your daily destination for delicious recipes that
                    bring people together. Let’s make every meal a memory.</p>

    </footer>
