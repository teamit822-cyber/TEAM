<!DOCTYPE html>
<html  lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bite & Brew</title>
        <link rel="stylesheet" href="design.css">
        <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>
    <body class="signup-page">
        
        <header class="logo_nav">
            <h2 class="logo">BITE&BREW</h2>
            

            <button class="mode_btn"><i class="bx bx-moon" id="dark_mode_button"></i><i class="bx bx-sun" id="light_mode_button" ></i></button>
            <input type="checkbox" id="check">
            <label for="check" class="icons">
                <i class='bx bx-menu' id="menu-icon"></i>
                <i class='bx bx-x' id="close-icon"></i>
            </label>
            <nav class="header-right">
                <a href="home.html" class="active">Home</a>
                <a href="breakfast.html">Breakfast</a>
                <a href="drinks.html">drinks</a>
                <a href="meals.html" >Meals</a>
                <a href="sweets.html" >Sweets</a>
                <a href="contactus.html" >contact us</a>
                <a href="SignUp.html" >SignUp</a>
                <a href="index.html" ><i class='bx bx-log-in'></i></a>
            </nav>
        </header>

        
        
        
            <div class="card-signup">
                <h2 class="h2-signup">Sign Up</h2>
                
                <div class="input-group">
                    <img src="user_icon.svg">
                    <label>Name</label>
                    <input type="text" placeholder="Name" id="name" >
                </div>
                <br>

                <div class="input-group">
                    <img src="email_icon.svg">
                    <label>Email</label>
                    <input type="email" placeholder="Email" id="email" required>
                </div>
                <br>
                
                <div class="input-group">
                    <img src="phone_icon.svg">
                    <label>Phone</label>
                    <input type="tel" placeholder="Phone" id="phone">
                </div>
                <br>

                <div class="input-group">
                    <img src="lock_icon.svg">
                    <label>Password</label>
                    <input type="password" placeholder="Password" id="pass">
                </div>
                <br>

                <div class="input-group">
                    <!-- <i class="bx bxs-lock-alt"></i> -->
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Confirm Password" id="confirmpass">
                </div>

                
                <button onclick="signup()" class="signup-btn">Sign Up</button>
    
                
            </div>
            <footer>
        <div class="content">
            <img src="bent_img.jpg" alt="">
        </div>
        <div class="container">
            <div class="center">
                <div class="follow">
                    <h3>Follow Us</h3>
                </div>

                <div class="imgfollow">
                    <div class="face">
                        <img src="face_img.jpg" alt="">
                    </div>
                    <div class="insta">
                        <img src="instegram_img.jpg" alt="">
                    </div>
                    <div class="twitt">
                        <img src="twitter_img.jpg" alt="">
                    </div>
                </div>
            </div>

            <div class="aboutus">
                <h3>About Us</h3>
                <p>Made with love, served with joy. Bite & Brew is your daily destination for delicious recipes that
                    bring people together. Let’s make every meal a memory.</p>
            </div>
        </div>

    </footer>
        <script src="main.js"></script>  
        
        </body>
</html>
