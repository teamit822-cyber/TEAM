                </div>
                <br>

                <div class="input-group">
                    <img src="email_icon.svg">

                </div>

                <div class="input-group">
                    <img src="phone_icon.svg">

                <br>

                <div class="input-group">
                    <img src="lock_icon.svg">

                <br>

                <div class="input-group">
                    <!-- <i class="bx bxs-lock-alt"></i> -->
                    <label>Confirm Password</label>
